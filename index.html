<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fyred Up Kitchens — FYRE Army</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --fire: #FF4500;
  --ember: #FF8C00;
  --gold: #FFD700;
  --smoke: #111111;
  --ash: #1e1e1e;
  --char: #2a2a2a;
  --cream: #FFF8F0;
  --text: #e8ddd0;
  --muted: #777;
  --army: #4a5c3a;
  --army-light: #6b7f52;
  --khaki: #c8b882;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--smoke);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  overflow-x: hidden;
}

/* ── NAV ── */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 500;
  background: rgba(17,17,17,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,69,0,0.2);
}

.nav-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.9rem 5vw;
}

.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: var(--fire);
  letter-spacing: 0.05em;
  cursor: pointer;
}

.nav-logo span {
  color: var(--khaki);
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  display: block;
  margin-top: -6px;
  font-family: 'Space Mono', monospace;
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--fire);
  transition: all 0.3s;
}

/* ── FIELD MENU (category nav) ── */
.field-menu {
  border-top: 1px solid rgba(255,69,0,0.1);
  padding: 0 5vw;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}

.field-menu::-webkit-scrollbar { display: none; }

.field-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0.7rem 1.2rem;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  position: relative;
}

.field-btn:hover { color: var(--ember); }

.field-btn.active {
  color: var(--fire);
  border-bottom-color: var(--fire);
}

.field-btn .btn-icon {
  display: block;
  font-size: 0.9rem;
  margin-bottom: 2px;
}

/* ── HERO ── */
.hero {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 97px 8vw 80px;
  position: relative;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse 80% 60% at 70% 40%, rgba(255,69,0,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 20% 80%, rgba(255,140,0,0.15) 0%, transparent 60%),
    linear-gradient(135deg, #0a0a0a 0%, #1a1008 50%, #0f0a00 100%);
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(17,17,17,0.3) 0%,
    rgba(17,17,17,0.0) 40%,
    rgba(17,17,17,0.8) 70%,
    rgba(17,17,17,1) 100%
  );
}

.hero-content { position: relative; z-index: 2; }

.hero-rank {
  font-size: 0.65rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--army-light);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.hero-rank::before {
  content: '⬡⬡⬡';
  color: var(--fire);
  letter-spacing: 0.2em;
}

.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(5rem, 15vw, 14rem);
  line-height: 0.88;
  color: var(--cream);
  letter-spacing: -0.01em;
}

.hero-title .fire-word { color: var(--fire); }
.hero-title .army-word { color: var(--khaki); }

.hero-tagline {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: clamp(1rem, 2.5vw, 1.6rem);
  color: var(--ember);
  margin-top: 1.2rem;
  margin-bottom: 2rem;
}

.hero-stats {
  display: flex;
  gap: 3rem;
  margin-top: 2rem;
}

.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.5rem;
  color: var(--fire);
  line-height: 1;
}

.stat-label {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}

/* ── THIS WEEK SECTION ── */
.this-week {
  padding: 80px 8vw 60px;
  border-bottom: 1px solid rgba(255,69,0,0.1);
}

.section-eyebrow {
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 0.62rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--fire);
  margin-bottom: 0.6rem;
}

.section-eyebrow::before {
  content: '';
  width: 40px;
  height: 1px;
  background: var(--fire);
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 6vw, 5rem);
  color: var(--cream);
  line-height: 1;
  margin-bottom: 2.5rem;
}

.week-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
}

.week-featured {
  grid-column: 1 / -1;
  background: var(--ash);
  border: 1px solid rgba(255,69,0,0.15);
  padding: 2.5rem;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.25s;
}

.week-featured::after {
  content: 'THIS WEEK';
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  background: var(--fire);
  color: #fff;
  padding: 0.3rem 0.7rem;
  font-weight: 700;
}

.week-featured:hover { background: #252525; transform: translateY(-2px); }

.week-featured .recipe-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 5rem;
  color: rgba(255,69,0,0.08);
  position: absolute;
  bottom: -1rem;
  right: 1.5rem;
  line-height: 1;
  pointer-events: none;
}

/* ── MAIN CONTENT AREA ── */
.main-content {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--ash);
  border-right: 1px solid rgba(255,69,0,0.1);
  padding: 2rem 0;
  position: sticky;
  top: 97px;
  height: calc(100vh - 97px);
  overflow-y: auto;
}

.sidebar-header {
  padding: 0 1.5rem 1.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  margin-bottom: 1rem;
}

.sidebar-title {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
}

.sidebar-nav { list-style: none; }

.sidebar-nav li { border-bottom: 1px solid rgba(255,255,255,0.03); }

.sidebar-btn {
  width: 100%;
  background: none;
  border: none;
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.5rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.sidebar-btn:hover { background: rgba(255,69,0,0.05); }

.sidebar-btn.active {
  background: rgba(255,69,0,0.08);
  border-left: 3px solid var(--fire);
}

.sidebar-icon {
  font-size: 1.2rem;
  width: 24px;
  text-align: center;
  flex-shrink: 0;
}

.sidebar-text { flex: 1; }

.sidebar-name {
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text);
  display: block;
}

.sidebar-subtitle {
  font-size: 0.6rem;
  color: var(--muted);
  font-style: italic;
  font-family: 'Instrument Serif', serif;
  margin-top: 1px;
}

.sidebar-btn.active .sidebar-name { color: var(--fire); }

.sidebar-count {
  font-size: 0.6rem;
  color: var(--muted);
  background: rgba(255,255,255,0.05);
  padding: 0.15rem 0.4rem;
  border-radius: 2px;
}

.sidebar-btn.active .sidebar-count {
  background: rgba(255,69,0,0.15);
  color: var(--fire);
}

/* ── RECIPE GRID ── */
.recipe-area {
  padding: 3rem 4vw;
}

.area-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.area-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.5rem;
  color: var(--cream);
  line-height: 1;
}

.area-subtitle {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 0.85rem;
  color: var(--muted);
}

.area-count {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
}

.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 2px;
}

/* ── RECIPE CARD ── */
.recipe-card {
  background: var(--ash);
  border: 1px solid rgba(255,255,255,0.04);
  padding: 2rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.recipe-card:hover {
  background: var(--char);
  border-color: rgba(255,69,0,0.2);
  transform: translateY(-2px);
}

.recipe-card::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--fire), var(--gold));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.recipe-card:hover::before { transform: scaleX(1); }

.card-category {
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--army-light);
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.card-new-badge {
  background: var(--fire);
  color: #fff;
  font-size: 0.52rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 0.1rem 0.4rem;
}

.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  line-height: 1.05;
  color: var(--cream);
  margin-bottom: 0.6rem;
}

.card-desc {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 0.88rem;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 1.2rem;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-meta {
  display: flex;
  gap: 1rem;
  font-size: 0.65rem;
  color: var(--muted);
}

.card-meta span { color: var(--fire); margin-right: 3px; }

.card-arrow {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--fire);
  opacity: 0;
  transition: opacity 0.2s;
}

.recipe-card:hover .card-arrow { opacity: 1; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,0.94);
  overflow-y: auto;
  padding: 40px 5vw;
}

.modal-overlay.open { display: block; }

.modal {
  max-width: 860px;
  margin: 0 auto;
  background: var(--ash);
  border: 1px solid rgba(255,69,0,0.2);
  position: relative;
}

.modal-header {
  padding: 2.5rem clamp(1.5rem, 5vw, 3.5rem);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: relative;
}

.modal-close {
  position: absolute;
  top: 1.5rem; right: 1.5rem;
  background: none;
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  font-family: 'Space Mono', monospace;
}

.modal-close:hover { border-color: var(--fire); color: var(--fire); }

.modal-category {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--army-light);
  margin-bottom: 0.6rem;
}

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem, 5vw, 3.8rem);
  color: var(--cream);
  line-height: 1;
  margin-bottom: 0.5rem;
}

.modal-desc {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--muted);
  margin-top: 0.5rem;
}

.modal-body {
  padding: 2.5rem clamp(1.5rem, 5vw, 3.5rem);
  display: grid;
  grid-template-columns: 1fr 1.6fr;
  gap: 3rem;
}

@media (max-width: 640px) {
  .modal-body { grid-template-columns: 1fr; gap: 2rem; }
  .week-grid { grid-template-columns: 1fr; }
  .main-content { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; display: none; }
  .hero { min-height: auto; padding: 120px 6vw 60px; }
  .hero-title { font-size: 4rem; }
  .hero-stats { gap: 2rem; }
  .hamburger { display: flex; }
  .field-menu { display: none; }
  .this-week { padding: 50px 6vw 40px; }
  .recipe-area { padding: 2rem 4vw; }
  .recipe-grid { grid-template-columns: 1fr; }
  .week-featured { padding: 1.5rem; }
  .about-section { padding: 60px 6vw; grid-template-columns: 1fr; gap: 2rem; }
  footer { flex-direction: column; gap: 0.5rem; text-align: center; }
}

.col-label {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ember);
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid rgba(255,140,0,0.15);
}

.ingredient-list { list-style: none; }

.ingredient-list li {
  font-size: 0.8rem;
  line-height: 1.6;
  padding: 0.4rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  display: flex;
  gap: 0.6rem;
  color: var(--text);
}

.ingredient-list li::before {
  content: '▸';
  color: var(--fire);
  flex-shrink: 0;
}

.steps-list { list-style: none; counter-reset: steps; }

.steps-list li {
  counter-increment: steps;
  display: flex;
  gap: 1rem;
  margin-bottom: 1.5rem;
  align-items: flex-start;
}

.steps-list li::before {
  content: counter(steps, decimal-leading-zero);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: rgba(255,69,0,0.5);
  line-height: 1;
  flex-shrink: 0;
  width: 2.2rem;
  padding-top: 0.2rem;
}

.step-text {
  font-size: 0.83rem;
  line-height: 1.8;
  color: var(--text);
  padding-top: 0.3rem;
}

.step-text strong { color: var(--gold); }

.notes-box {
  margin: 0 clamp(1.5rem, 5vw, 3.5rem) 2.5rem;
  background: rgba(74,92,58,0.12);
  border-left: 3px solid var(--army-light);
  padding: 1.2rem 1.5rem;
  font-size: 0.8rem;
  line-height: 1.8;
  color: var(--muted);
  font-family: 'Instrument Serif', serif;
  font-style: italic;
}

.notes-label {
  font-family: 'Space Mono', monospace;
  font-style: normal;
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--army-light);
  display: block;
  margin-bottom: 0.5rem;
}

/* ── ABOUT ── */
.about-section {
  padding: 100px 8vw;
  background: var(--ash);
  border-top: 1px solid rgba(255,69,0,0.1);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  align-items: center;
}

@media (max-width: 700px) {
  .about-section { grid-template-columns: 1fr; gap: 2rem; }
}

.about-quote {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.2rem, 5vw, 4rem);
  line-height: 1.1;
  color: var(--cream);
}

.about-quote em {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  color: var(--fire);
}

.about-text { font-size: 0.82rem; line-height: 2.1; color: var(--muted); }
.about-text p + p { margin-top: 1rem; }

/* ── FOOTER ── */
footer {
  padding: 2.5rem 8vw;
  border-top: 1px solid rgba(255,69,0,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}

.footer-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  color: var(--fire);
}

.footer-logo span {
  color: var(--khaki);
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  display: block;
  font-family: 'Space Mono', monospace;
  margin-top: -4px;
}

/* ── EMPTY STATE ── */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 5rem 2rem;
  color: var(--muted);
}

.empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
.empty-state p { font-size: 0.8rem; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-top">
    <div class="nav-logo" onclick="showSection('all'); scrollToRecipes()">
      FYRE ARMY
      <span>Fyred Up Kitchens · by Jade</span>
    </div>
    <button class="hamburger" onclick="toggleMobile()">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="field-menu" id="fieldMenu">
    <button class="field-btn active" onclick="showSection('all')" data-section="all">
      <span class="btn-icon">🏕️</span>Field Kitchen
    </button>
    <button class="field-btn" onclick="showSection('mess')" data-section="mess">
      <span class="btn-icon">🍖</span>Mess Hall
    </button>
    <button class="field-btn" onclick="showSection('commissary')" data-section="commissary">
      <span class="btn-icon">🍞</span>Commissary
    </button>
    <button class="field-btn" onclick="showSection('chow')" data-section="chow">
      <span class="btn-icon">🥬</span>Chow Line
    </button>
    <button class="field-btn" onclick="showSection('sweet')" data-section="sweet">
      <span class="btn-icon">🍍</span>Sweet Relief
    </button>
    <button class="field-btn" onclick="showSection('canteen')" data-section="canteen">
      <span class="btn-icon">🥤</span>Canteen
    </button>
  </div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-rank">FYRE Army Field Kitchen · Breaux Bridge to Tukwila</div>
    <h1 class="hero-title">
      <span class="fire-word">FYRED</span>
      <span class="army-word">UP</span>
    </h1>
    <p class="hero-tagline">Hood fusion · WWII rations · East meets west · Live on TikTok</p>
    <div class="hero-stats">
      <div>
        <div class="stat-num" id="totalRecipes">23</div>
        <div class="stat-label">Recipes in the book</div>
      </div>
      <div>
        <div class="stat-num">🔥</div>
        <div class="stat-label">Live every week</div>
      </div>
    </div>
  </div>
</section>

<!-- THIS WEEK -->
<section class="this-week" id="thisWeek">
  <div class="section-eyebrow">Deployment Orders</div>
  <h2 class="section-title">This Week's Rations</h2>
  <div class="week-grid" id="weekGrid"></div>
</section>

<!-- MAIN CONTENT -->
<div class="main-content" id="mainContent">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Field Sections</div>
    </div>
    <ul class="sidebar-nav">
      <li>
        <button class="sidebar-btn active" onclick="showSection('all')" data-section="all">
          <span class="sidebar-icon">🏕️</span>
          <div class="sidebar-text">
            <span class="sidebar-name">Field Kitchen</span>
            <span class="sidebar-subtitle">All recipes</span>
          </div>
          <span class="sidebar-count" id="count-all">0</span>
        </button>
